<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="head">
    <img src="../../icons/icon-32.png" alt="" width="28" height="28">
    <h1>Twitch Auto</h1>
    <label class="switch" title="Activer / desactiver">
      <input type="checkbox" id="master">
      <span class="slider"></span>
    </label>
  </header>

  <div id="update-banner" class="update-banner" aria-live="polite" hidden>
    <span id="update-text"></span>
    <button id="update-dl" class="update-dl">Telecharger la MAJ</button>
    <span id="update-hint" class="update-hint"></span>
  </div>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="stats" role="tab" aria-selected="true">Stats</button>
    <button class="tab" data-tab="history" role="tab" aria-selected="false">Historique</button>
    <button class="tab" data-tab="settings" role="tab" aria-selected="false">Reglages</button>
  </nav>

  <!-- Onglet STATS -->
  <!-- Icones : jeu Lucide (https://lucide.dev), licence ISC -->
  <div class="panel" id="tab-stats">
    <section class="stats" aria-live="polite">
      <div class="stat" aria-label="Points reclames">
        <svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#00e0c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 3h12l4 6-10 13L2 9Z"/>
          <path d="M11 3 8 9l4 13 4-13-3-6"/>
          <path d="M2 9h20"/>
        </svg>
        <span class="val cyan" id="points-value">0</span>
        <span class="stat-label">Points</span>
        <span class="last" id="points-last">jamais</span>
      </div>
      <div class="stat" aria-label="Drops reclames">
        <svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ffc83d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="8" width="18" height="4" rx="1"/>
          <path d="M12 8v13"/>
          <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/>
          <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/>
        </svg>
        <span class="val gold" id="drops-value">0</span>
        <span class="stat-label">Drops</span>
        <span class="last" id="drops-last">jamais</span>
      </div>
    </section>

    <p class="meta" id="meta"></p>

    <section id="inprogress-section" hidden>
      <h2>Drops en cours</h2>
      <div id="inprogress"></div>
    </section>

    <section id="channels-section" hidden>
      <h2>Top chaines</h2>
      <div id="channels"></div>
    </section>

    <footer class="foot">
      <button id="open-inventory" class="btn">Ouvrir mon inventaire de drops</button>
    </footer>
  </div>

  <!-- Onglet HISTORIQUE -->
  <div class="panel" id="tab-history" hidden>
    <div id="history" class="history"></div>
  </div>

  <!-- Onglet REGLAGES -->
  <div class="panel" id="tab-settings" hidden>
    <section>
      <div id="features" class="features"></div>
    </section>

    <div id="autoswitch-row" class="as-row" hidden>
      <input id="autoswitch-url" type="text" placeholder="URL de repli (ex: https://www.twitch.tv/maChaine)">
    </div>

    <p id="diag" class="diag" role="alert"></p>

    <div class="foot-row settings-foot">
      <span id="version">v1.0.0</span>
      <span class="foot-actions">
        <button id="export" class="link">exporter</button>
        <button id="reset" class="link">reinitialiser</button>
      </span>
    </div>
  </div>

  <script src="../shared/util.js"></script>
  <script src="popup.js"></script>
</body>
</html>
