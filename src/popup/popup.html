<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="head">
    <img src="../../icons/icon-32.png" alt="" width="28" height="28">
    <h1>Twitch Auto</h1>
    <label class="switch" title="Activer / desactiver">
      <input type="checkbox" id="master">
      <span class="slider"></span>
    </label>
  </header>

  <div id="update-banner" class="update-banner" hidden>
    <span id="update-text"></span>
    <button id="update-dl" class="update-dl">Telecharger la MAJ</button>
    <span id="update-hint" class="update-hint"></span>
  </div>

  <!-- Icones : jeu Lucide (https://lucide.dev), licence ISC -->
  <section class="stats">
    <div class="stat">
      <svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#00e0c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 3h12l4 6-10 13L2 9Z"/>
        <path d="M11 3 8 9l4 13 4-13-3-6"/>
        <path d="M2 9h20"/>
      </svg>
      <span class="val cyan" id="points-value">0</span>
      <span class="last" id="points-last">jamais</span>
    </div>
    <div class="stat">
      <svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ffc83d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="8" width="18" height="4" rx="1"/>
        <path d="M12 8v13"/>
        <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/>
        <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/>
      </svg>
      <span class="val gold" id="drops-value">0</span>
      <span class="last" id="drops-last">jamais</span>
    </div>
  </section>

  <section>
    <h2>Reglages</h2>
    <div id="features" class="features"></div>
  </section>

  <section>
    <h2>Historique</h2>
    <div id="history" class="history"></div>
  </section>

  <p id="diag" class="diag"></p>

  <footer class="foot">
    <button id="open-inventory" class="btn">Ouvrir mon inventaire de drops</button>
    <div class="foot-row">
      <span id="version">v1.0.0</span>
      <button id="reset" class="link">reinitialiser compteurs</button>
    </div>
  </footer>

  <script src="../shared/util.js"></script>
  <script src="popup.js"></script>
</body>
</html>
